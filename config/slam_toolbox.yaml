# slam_toolbox.yaml
# -----------------
# Minimal config for online async SLAM with the Edubot.
# Key setting: always start fresh (never reuse old maps).

slam_toolbox:
  ros__parameters:
    # Always start a fresh map — required by the project spec
    mode: mapping

    # Topic names (match your robot's actual topics)
    scan_topic: /scan
    odom_topic: /odometry/filtered
    map_frame:  map
    base_frame: base_footprint
    odom_frame: odom

    # Fresh start every run — do NOT set a serialized map file
    map_file_name: ""
    map_start_at_dock: false

    # Resolution (metres per cell) — 0.05 is a good balance
    resolution: 0.05
    max_laser_range: 5.0
    minimum_travel_distance: 0.05   # update map every 5 cm of travel
    minimum_travel_heading: 0.1     # or 0.1 rad of rotation

    # Scan matcher settings (good defaults for indoor)
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.1

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
